<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- css linki -->
    <link rel="stylesheet" href="japan_contact.css">


    <!-- Latest compiled and minified CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Latest compiled JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>


    <!-- font awesome linki -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!--font stili -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Delius&family=Nanum+Brush+Script&family=Reenie+Beanie&display=swap"
        rel="stylesheet">

    <title>Shiシ</title>
</head>

<body>
    <header class="w-100">
        <nav class="navbar navbar-expand-sm  navbar-dark  py-0 fixed-top">
            <div class="container">
                <a class="navbar-brand" href="japan_home.html">シ</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#collapsibleNavbar">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="collapsibleNavbar">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item px-3">
                            <a class="nav-link " href="japan_home.html">HOME</a>
                        </li>
                        <li class="nav-item px-3">
                            <a class="nav-link" href="japan_store.html">STORE</a>
                        </li>
                        <li class="nav-item px-3">
                            <a class="nav-link" href="japan_reviews.html">REVIEWS</a>
                        </li>
                        <li class="nav-item px-3">
                            <a class="nav-link active" href="japan_contact.html">CONTACT</a>
                        </li>

                    </ul>
                </div>
            </div>

        </nav>


        <div class="container div-inputs ">
            <div class="div ">
                <div class="container">
                    <div class="row">
                        <div class="col-lg-12 col-sm-3">
                            <h2><i class="fa-solid fa-envelope"></i> <span>Email</span> </h2>
                            <p>info@shi.com</p>
                        </div>
                        <div class="col-lg-12 col-sm-3">
                            <h2><i class="fa-solid fa-phone"></i> <span>Phone:</span> </h2>
                            <p>+994 123 45 67</p>
                        </div>
                        <div class="col-lg-12 col-sm-3">
                            <h2><i class="fa-solid fa-location-dot"></i> <span> Location:</span></h2>
                            <p class="mb-0">Tokyo, Japan</p>
                        </div>
                    </div>
                </div>



            </div>

            <div class="inputs">
                <h1>Contact Us!</h1>
                <form action="">
                    <div class="form-floating  mt-4 mb-4">
                        <input type="text" class="form-control" required id="name" placeholder="Enter Name"
                            name="fullname-input">
                        <label for="name">Full Name</label>
                    </div>
                    <div class="form-floating  mt-4 mb-4">
                        <input type="email" class="form-control" required id="email" placeholder="Enter Name"
                            name="email-input">
                        <label for="email">Email</label>
                    </div>
                    <div class="form-floating">
                        <textarea class="form-control" id="message" required name="text"
                            placeholder="Comment goes here"></textarea>
                        <label for="message">Message</label>
                    </div>
                    <button type="submit" class="submit-btn">Submit</button>


                </form>
            </div>



        </div>


    </header>







    <script src="japan_contact.js"></script>
</body>

</html>
